<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 130" width="100%">
  <defs>
    <style>
      .s{animation:tw var(--d,3s) var(--dl,0s) infinite alternate ease-in-out}
      .nb{animation:nbp 5s var(--dl,0s) infinite alternate ease-in-out}
      .sh{animation:shoot var(--d,10s) var(--dl,0s) infinite linear;opacity:0}
      @keyframes tw{0%{opacity:.08}100%{opacity:1}}
      @keyframes nbp{0%{opacity:.1}100%{opacity:.3}}
      @keyframes shoot{
        0%{transform:translate(0,0);opacity:0}
        4%{opacity:.9}
        25%{opacity:0}
        100%{transform:translate(960px,70px);opacity:0}
      }
    </style>
    <radialGradient id="ng1" cx="27%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#030014" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ng2" cx="73%" cy="62%" r="32%">
