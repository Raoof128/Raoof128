<svg viewBox="0 0 1200 110" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="divider" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#09090b"/>
      <stop offset="15%"  stop-color="#06b6d4" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#8b5cf6" stop-opacity="0.7"/>
      <stop offset="85%"  stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <!-- Animated flowing gradient for the top divider bar -->
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#09090b">
        <animate attributeName="offset" values="0;0.15;0"    dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="20%"  stop-color="#06b6d4">
        <animate attributeName="offset" values="0.15;0.35;0.15" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%"  stop-color="#8b5cf6">
        <animate attributeName="offset" values="0.45;0.55;0.45" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="80%"  stop-color="#f59e0b">
        <animate attributeName="offset" values="0.75;0.85;0.75" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#09090b">
        <animate attributeName="offset" values="1;0.9;1"     dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow-sm" x="-10%" y="-60%" width="120%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.03"/>
    </pattern>
    <style>
      .txt  { font: 400 12px 'Courier New',Courier,monospace; letter-spacing: 2px; }
      .site { font: 700 14px 'Courier New',Courier,monospace; letter-spacing: 3px; }
      /* Corner pulse */
      .cr { animation: cpulse 3s ease-in-out infinite; }
      .cr2 { animation: cpulse 3s ease-in-out 1.5s infinite; }
      /* Dot blink */
      .dot1 { animation: dblink 2.4s ease-in-out 0.0s infinite; }
      .dot2 { animation: dblink 2.4s ease-in-out 0.8s infinite; }
      .dot3 { animation: dblink 2.4s ease-in-out 1.6s infinite; }
      /* Text fade in */
      .fadein { animation: fi 1.4s ease 0.3s both; opacity:0; }
      @keyframes cpulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
      @keyframes dblink  { 0%,100%{opacity:0.2} 50%{opacity:1} }
      @keyframes fi { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="110" fill="#09090b"/>
  <rect width="1200" height="110" fill="url(#grid)"/>

  <!-- ─── Animated top divider ─── -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#flowGrad)"/>
  <rect x="0" y="2" width="1200" height="1" fill="url(#divider)" opacity="0.4"/>

  <!-- ─── Corner brackets ─── -->
  <g class="cr">
    <polyline points="0,20 0,110 50,110" fill="none" stroke="#06b6d4" stroke-width="1.5" filter="url(#glow-sm)"/>
    <polyline points="8,110 8,102 0,102"  fill="none" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4"/>
  </g>
  <g class="cr2">
    <polyline points="1200,20 1200,110 1150,110" fill="none" stroke="#f59e0b" stroke-width="1.5" filter="url(#glow-sm)"/>
    <polyline points="1192,110 1192,102 1200,102" fill="none" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
  </g>

  <!-- ─── Pulsing dots ─── -->
  <circle cx="90"  cy="55" r="3" fill="#06b6d4" class="dot1" filter="url(#glow-sm)"/>
  <circle cx="106" cy="55" r="3" fill="#8b5cf6" class="dot2" filter="url(#glow-sm)"/>
  <circle cx="122" cy="55" r="3" fill="#f59e0b" class="dot3" filter="url(#glow-sm)"/>
  <circle cx="1078" cy="55" r="3" fill="#06b6d4" class="dot3" filter="url(#glow-sm)"/>
  <circle cx="1094" cy="55" r="3" fill="#8b5cf6" class="dot2" filter="url(#glow-sm)"/>
  <circle cx="1110" cy="55" r="3" fill="#f59e0b" class="dot1" filter="url(#glow-sm)"/>

  <!-- ─── Website URL ─── -->
  <text x="600" y="50" text-anchor="middle" class="site fadein" fill="#06b6d4" filter="url(#glow-sm)">raoufabedini.dev</text>

  <!-- ─── Tagline ─── -->
  <text x="600" y="76" text-anchor="middle" class="txt fadein" fill="#27272a">Discovering Vulnerabilities. Measuring AI Safety. Building Safer Systems.</text>

  <!-- ─── Bottom line ─── -->
  <rect x="0" y="108" width="1200" height="2" fill="url(#divider)"/>
</svg>
