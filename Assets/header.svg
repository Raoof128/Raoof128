<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="divider" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#030014"/>
      <stop offset="15%"  stop-color="#7c3aed" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#ec4899" stop-opacity="0.7"/>
      <stop offset="85%"  stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#030014"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="50%"  stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#a78bfa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#030014" stop-opacity="0"/>
      <stop offset="100%" stop-color="#030014" stop-opacity="0.85"/>
    </radialGradient>
    <radialGradient id="ng1" cx="22%" cy="40%" r="28%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#030014" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ng2" cx="78%" cy="65%" r="25%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#030014" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ng3" cx="50%" cy="50%" r="18%">
      <stop offset="0%" stop-color="#4c1d95" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#030014" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sg" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="45%"  stop-color="#ffffff" stop-opacity=".85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow-v" x="-15%" y="-60%" width="130%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scanlines" x="0" y="0" width="1200" height="4" patternUnits="userSpaceOnUse">
      <rect width="1200" height="1" y="3" fill="#ffffff" fill-opacity="0.018"/>
    </pattern>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#a78bfa" stroke-width="0.3" stroke-opacity="0.06"/>
    </pattern>
    <style>
      .name-main { font: 900 76px 'Arial Black','Arial Bold',Arial,sans-serif; letter-spacing:6px; }
      .name-ghost{ font: 900 76px 'Arial Black','Arial Bold',Arial,sans-serif; letter-spacing:6px; }
      .role { font: 400 20px 'Courier New',Courier,monospace; letter-spacing:3px; }
      .tag  { font: 400 13px 'Courier New',Courier,monospace; letter-spacing:2px; }

      .st  { animation: tw var(--d,3s) var(--dl,0s) infinite alternate ease-in-out; }
      .nb  { animation: nbp 5s var(--dl,0s) infinite alternate ease-in-out; }
      .sh  { animation: shoot var(--d,12s) var(--dl,0s) infinite linear; opacity:0; }
      .corner { animation: corner-pulse 3s ease-in-out infinite; }
      .name-main { animation: glitch-main 7s infinite; }
      .ghost-r { fill:#fbbf24; opacity:0; animation: ghost-r 7s infinite; }
      .ghost-l { fill:#ec4899;  opacity:0; animation: ghost-l 7s infinite; }
      .role { animation: fadein 1.2s ease 0.5s both; opacity:0; }
      .tag  { animation: fadein 1.2s ease 1.0s both; opacity:0; }

      @keyframes tw { 0%{opacity:.06} 100%{opacity:1} }
      @keyframes nbp { 0%{opacity:.1} 100%{opacity:.32} }
      @keyframes shoot {
        0%{transform:translate(0,0);opacity:0}
        4%{opacity:.9} 22%{opacity:0}
        100%{transform:translate(1300px,80px);opacity:0}
      }
      @keyframes corner-pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
      @keyframes glitch-main {
        0%,85%,100%{transform:translate(0,0)}
        86%{transform:translate(-3px,0)} 87%{transform:translate(3px,0)}
        88%{transform:translate(-2px,1px)} 89%{transform:translate(2px,-1px)}
        90%{transform:translate(0,0)}
      }
      @keyframes ghost-r {
        0%,85%,91%,100%{opacity:0;transform:translate(0,0)}
        86%{opacity:.35;transform:translate(4px,0)}
        87%{opacity:.2;transform:translate(-2px,0)}
        88%{opacity:.3;transform:translate(3px,0)}
        89%{opacity:.15;transform:translate(-1px,0)}
        90%{opacity:0;transform:translate(0,0)}
      }
      @keyframes ghost-l {
        0%,85%,91%,100%{opacity:0;transform:translate(0,0)}
        86%{opacity:.3;transform:translate(-4px,0)}
        87%{opacity:.2;transform:translate(2px,0)}
        88%{opacity:.25;transform:translate(-3px,0)}
        89%{opacity:.1;transform:translate(1px,0)}
        90%{opacity:0;transform:translate(0,0)}
      }
      @keyframes fadein {
        from{opacity:0;transform:translateY(6px)}
        to{opacity:1;transform:translateY(0)}
      }
    </style>
  </defs>

  <!-- void + grid + vignette -->
  <rect width="1200" height="280" fill="#030014"/>
  <rect width="1200" height="280" fill="url(#grid)"/>
  <rect width="1200" height="280" fill="url(#vignette)"/>

  <!-- nebula glows -->
  <ellipse class="nb" cx="264" cy="112" rx="280" ry="130" fill="url(#ng1)"/>
  <ellipse class="nb" cx="936" cy="182" rx="260" ry="120" fill="url(#ng2)" style="--dl:2.5s"/>
  <ellipse class="nb" cx="600" cy="140" rx="200" ry="100" fill="url(#ng3)" style="--dl:1.1s"/>

