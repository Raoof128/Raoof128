<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Colours matching portfolio globals.css -->
    <linearGradient id="divider" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#09090b"/>
      <stop offset="15%"  stop-color="#06b6d4" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#8b5cf6" stop-opacity="0.7"/>
      <stop offset="85%"  stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="50%"  stop-color="#e4e4e7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#06b6d4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#0f1115" stop-opacity="0"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0.8"/>
    </radialGradient>
    <!-- Glow filters -->
    <filter id="glow-cyan" x="-15%" y="-60%" width="130%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="1200" height="4" patternUnits="userSpaceOnUse">
      <rect width="1200" height="1" y="3" fill="#ffffff" fill-opacity="0.02"/>
    </pattern>
    <!-- Grid -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.035"/>
    </pattern>
    <style>
      .name-main  { font: 900 76px 'Arial Black','Arial Bold',Arial,sans-serif; letter-spacing: 6px; }
      .name-ghost { font: 900 76px 'Arial Black','Arial Bold',Arial,sans-serif; letter-spacing: 6px; }
      .role { font: 400 20px 'Courier New',Courier,monospace; letter-spacing: 3px; }
      .tag  { font: 400 13px 'Courier New',Courier,monospace; letter-spacing: 2px; }
      .mc   { font: bold 14px 'Courier New',Courier,monospace; }

      /* Name glitch — triggers every ~7s */
      .name-main {
        animation: glitch-main 7s infinite;
      }
      .ghost-r {
        fill: #f59e0b; opacity: 0;
        animation: ghost-r 7s infinite;
      }
      .ghost-l {
        fill: #8b5cf6; opacity: 0;
        animation: ghost-l 7s infinite;
      }

      /* Corner pulse */
      .corner { animation: corner-pulse 3s ease-in-out infinite; }

      /* Role fade in */
      .role { animation: fadein 1.2s ease 0.5s both; opacity: 0; }
      .tag  { animation: fadein 1.2s ease 1.0s both; opacity: 0; }

      @keyframes glitch-main {
        0%,85%,100% { transform:translate(0,0); }
        86%  { transform:translate(-3px,0); }
        87%  { transform:translate(3px,0);  }
        88%  { transform:translate(-2px,1px); }
        89%  { transform:translate(2px,-1px); }
        90%  { transform:translate(0,0); }
      }
      @keyframes ghost-r {
        0%,85%,91%,100% { opacity:0; transform:translate(0,0); }
        86%  { opacity:0.35; transform:translate(4px,0); }
        87%  { opacity:0.2;  transform:translate(-2px,0); }
        88%  { opacity:0.3;  transform:translate(3px,0); }
        89%  { opacity:0.15; transform:translate(-1px,0); }
        90%  { opacity:0;    transform:translate(0,0); }
      }
      @keyframes ghost-l {
        0%,85%,91%,100% { opacity:0; transform:translate(0,0); }
        86%  { opacity:0.3; transform:translate(-4px,0); }
        87%  { opacity:0.2; transform:translate(2px,0); }
        88%  { opacity:0.25;transform:translate(-3px,0); }
        89%  { opacity:0.1; transform:translate(1px,0); }
        90%  { opacity:0;   transform:translate(0,0); }
      }
      @keyframes corner-pulse {
        0%,100% { opacity:0.5; }
        50%     { opacity:1.0; }
      }
      @keyframes fadein {
        from { opacity:0; transform:translateY(6px); }
        to   { opacity:1; transform:translateY(0); }
      }
    </style>
  </defs>

  <!-- ─── Base ─── -->
  <rect width="1200" height="280" fill="#09090b"/>
  <rect width="1200" height="280" fill="url(#grid)"/>
  <rect width="1200" height="280" fill="url(#vignette)"/>

  <!-- ─── Matrix rain columns ─── -->
  <!-- Column 1 — dur 4.2s, begin 0 -->
  <g class="mc">
    <text x="48" y="16"  fill="#0b1e22">0</text><text x="48" y="32"  fill="#0c2429">1</text>
    <text x="48" y="48"  fill="#0d2b31">A</text><text x="48" y="64"  fill="#0e333a">F</text>
    <text x="48" y="80"  fill="#103c44">0</text><text x="48" y="96"  fill="#12454f">1</text>
