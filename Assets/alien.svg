<svg viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Sky gradient: deep void → twilight horizon -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#030014"/>
      <stop offset="55%"  stop-color="#0d0520"/>
      <stop offset="85%"  stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#2d0b4e"/>
    </linearGradient>
    <!-- Horizon glow band -->
    <linearGradient id="horizon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.22"/>
    </linearGradient>
    <!-- Border divider -->
    <linearGradient id="divider" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#030014"/>
      <stop offset="15%"  stop-color="#7c3aed" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#ec4899" stop-opacity="0.7"/>
      <stop offset="85%"  stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#030014"/>
    </linearGradient>
    <!-- Nebula gradients -->
    <radialGradient id="neb1" cx="20%" cy="60%" r="28%">
      <stop offset="0%"   stop-color="#ec4899" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#030014" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="78%" cy="45%" r="24%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#030014" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb3" cx="50%" cy="80%" r="35%">
      <stop offset="0%"   stop-color="#4c1d95" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#030014" stop-opacity="0"/>
    </radialGradient>
    <!-- Scanline sweep -->
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#a78bfa" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <!-- Subtle grid -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7c3aed" stroke-width="0.3" stroke-opacity="0.06"/>
    </pattern>
    <!-- Glow filters (kept from original) -->
    <filter id="glow-cyan" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-eye" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      .s{animation:tw var(--d,3s) var(--dl,0s) infinite alternate ease-in-out}
      .nb{animation:nbp 6s var(--dl,0s) infinite alternate ease-in-out}
      @keyframes tw{0%{opacity:.05}100%{opacity:1}}
      @keyframes nbp{0%{opacity:.6}100%{opacity:1}}

      .eye-group{transform-box:fill-box;transform-origin:50% 50%;animation:blink 4s ease-in-out infinite}
      @keyframes blink{0%,88%,100%{transform:scaleY(1)}93%{transform:scaleY(0.06)}97%{transform:scaleY(1)}}

      .ant-tip-l{animation:pulse 1.2s ease-in-out infinite}
      .ant-tip-r{animation:pulse 1.2s ease-in-out infinite 0.6s}
      @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}

      .arm-l{animation:flicker 2.1s ease-in-out infinite}
      .arm-r{animation:flicker 2.1s ease-in-out infinite 1.05s}
      @keyframes flicker{0%,44%,56%,84%,92%,100%{opacity:1}50%{opacity:.25}88%{opacity:.55}}
    </style>
  </defs>

  <!-- ─── Sky background ─── -->
  <rect width="1200" height="200" fill="url(#sky)"/>
  <rect width="1200" height="200" fill="url(#grid)"/>

  <!-- Nebula atmosphere -->
  <ellipse class="nb" cx="240"  cy="120" rx="280" ry="130" fill="url(#neb1)" style="--dl:0s"/>
  <ellipse class="nb" cx="936"  cy="90"  rx="240" ry="110" fill="url(#neb2)" style="--dl:2.8s"/>
  <ellipse class="nb" cx="600"  cy="180" rx="360" ry="100" fill="url(#neb3)" style="--dl:1.4s"/>

  <!-- Horizon glow -->
  <rect y="100" width="1200" height="100" fill="url(#horizon)"/>

  <!-- ─── Stars ─── -->
  <!-- top band -->
  <circle class="s" cx="35"   cy="8"   r=".7" fill="#fff"    style="--d:3.1s;--dl:.2s"/>
  <circle class="s" cx="94"   cy="14"  r=".5" fill="#a78bfa" style="--d:4.2s;--dl:1.1s"/>
  <circle class="s" cx="163"  cy="6"   r=".8" fill="#fff"    style="--d:2.9s;--dl:.5s"/>
  <circle class="s" cx="238"  cy="17"  r=".6" fill="#fff"    style="--d:5.0s;--dl:2.2s"/>
  <circle class="s" cx="311"  cy="9"   r=".5" fill="#ec4899" style="--d:3.6s;--dl:.8s"/>
  <circle class="s" cx="395"  cy="15"  r=".9" fill="#fff"    style="--d:4.7s;--dl:1.5s"/>
  <circle class="s" cx="467"  cy="7"   r=".6" fill="#fff"    style="--d:3.3s;--dl:.3s"/>
  <circle class="s" cx="540"  cy="18"  r=".7" fill="#a78bfa" style="--d:5.4s;--dl:2.7s"/>
  <circle class="s" cx="613"  cy="11"  r=".5" fill="#fff"    style="--d:2.8s;--dl:.9s"/>
  <circle class="s" cx="688"  cy="16"  r=".8" fill="#fff"    style="--d:4.1s;--dl:1.8s"/>
  <circle class="s" cx="762"  cy="8"   r=".6" fill="#ec4899" style="--d:3.8s;--dl:.6s"/>
  <circle class="s" cx="835"  cy="19"  r=".5" fill="#fff"    style="--d:5.2s;--dl:2.0s"/>
  <circle class="s" cx="908"  cy="12"  r=".7" fill="#a78bfa" style="--d:3.5s;--dl:1.3s"/>
  <circle class="s" cx="981"  cy="5"   r=".9" fill="#fff"    style="--d:4.9s;--dl:.4s"/>
  <circle class="s" cx="1054" cy="16"  r=".5" fill="#fff"    style="--d:3.2s;--dl:1.7s"/>
  <circle class="s" cx="1127" cy="10"  r=".8" fill="#ec4899" style="--d:5.6s;--dl:2.9s"/>
  <!-- bright accent stars -->
  <circle class="s" cx="148"  cy="32"  r="1.6" fill="#fff"   style="--d:6.2s;--dl:1.0s"/>
  <circle class="s" cx="502"  cy="27"  r="1.8" fill="#a78bfa" style="--d:7.0s;--dl:3.1s"/>
  <circle class="s" cx="780"  cy="38"  r="1.5" fill="#fff"   style="--d:5.8s;--dl:.7s"/>
  <circle class="s" cx="1040" cy="29"  r="1.7" fill="#ec4899" style="--d:6.7s;--dl:2.3s"/>
  <!-- mid band -->
  <circle class="s" cx="72"   cy="48"  r=".6" fill="#fff"    style="--d:4.0s;--dl:1.4s"/>
  <circle class="s" cx="189"  cy="55"  r=".8" fill="#a78bfa" style="--d:3.7s;--dl:.6s"/>
  <circle class="s" cx="334"  cy="43"  r=".5" fill="#fff"    style="--d:5.1s;--dl:2.5s"/>
  <circle class="s" cx="478"  cy="58"  r=".7" fill="#fff"    style="--d:3.4s;--dl:.9s"/>
  <circle class="s" cx="724"  cy="46"  r=".6" fill="#ec4899" style="--d:4.6s;--dl:1.6s"/>
  <circle class="s" cx="869"  cy="54"  r=".9" fill="#fff"    style="--d:2.7s;--dl:.3s"/>
  <circle class="s" cx="1013" cy="44"  r=".5" fill="#a78bfa" style="--d:5.3s;--dl:2.1s"/>
  <circle class="s" cx="1158" cy="52"  r=".7" fill="#fff"    style="--d:3.9s;--dl:1.2s"/>

  <!-- ─── Scanline sweep ─── -->
  <rect x="0" y="-8" width="1200" height="8" fill="url(#scanGrad)" opacity="0.7">
    <animate attributeName="y" from="-8" to="208" dur="5s" repeatCount="indefinite" begin="0s"/>
  </rect>

  <!-- ═══════════════════ ALIEN CHARACTER ═══════════════════ -->
  <g id="alien">
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      from="-250 0" to="1250 0" dur="14s" repeatCount="indefinite"/>

    <g id="bob">
      <animateTransform attributeName="transform" attributeType="XML" type="translate"
        values="0,0; 0,4; 0,0; 0,-4; 0,0"
        keyTimes="0;0.25;0.5;0.75;1"
        dur="0.6s" repeatCount="indefinite"/>

      <!-- ── LEGS ── -->
      <line x1="-18" y1="142" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round">
        <animate attributeName="x2" values="-28;-8;-28"   dur="0.6s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="168;178;168"   dur="0.6s" repeatCount="indefinite"/>
      </line>
      <line x1="18"  y1="142" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round">
        <animate attributeName="x2" values="8;28;8"        dur="0.6s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="178;168;178"   dur="0.6s" repeatCount="indefinite"/>
      </line>
      <line x1="-36" y1="137" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round">
        <animate attributeName="x2" values="-26;-46;-26"  dur="0.6s" repeatCount="indefinite" begin="-0.15s"/>
        <animate attributeName="y2" values="178;168;178"  dur="0.6s" repeatCount="indefinite" begin="-0.15s"/>
      </line>
      <line x1="36"  y1="137" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round">
        <animate attributeName="x2" values="46;26;46"     dur="0.6s" repeatCount="indefinite" begin="-0.15s"/>
        <animate attributeName="y2" values="168;178;168"  dur="0.6s" repeatCount="indefinite" begin="-0.15s"/>
      </line>
      <line x1="-51" y1="126" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round">
        <animate attributeName="x2" values="-61;-41;-61"  dur="0.6s" repeatCount="indefinite" begin="-0.3s"/>
        <animate attributeName="y2" values="160;170;160"  dur="0.6s" repeatCount="indefinite" begin="-0.3s"/>
      </line>
      <line x1="51"  y1="126" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round">
        <animate attributeName="x2" values="41;61;41"     dur="0.6s" repeatCount="indefinite" begin="-0.3s"/>
        <animate attributeName="y2" values="170;160;170"  dur="0.6s" repeatCount="indefinite" begin="-0.3s"/>
      </line>

      <!-- ── ANTENNAS ── -->
      <line x1="-19" y1="72" stroke="#06b6d4" stroke-width="2" stroke-linecap="round">
        <animate attributeName="x2" values="-30;-22;-30" dur="1s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="48;44;48"    dur="1s" repeatCount="indefinite"/>
      </line>
      <circle class="ant-tip-l" cx="-30" cy="47" r="5.5" fill="#06b6d4" filter="url(#glow-sm)">
        <animate attributeName="cx" values="-31;-23;-31" dur="1s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="47;43;47"    dur="1s" repeatCount="indefinite"/>
      </circle>
      <line x1="19" y1="72" stroke="#06b6d4" stroke-width="2" stroke-linecap="round">
        <animate attributeName="x2" values="22;30;22" dur="1s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="44;48;44" dur="1s" repeatCount="indefinite"/>
      </line>
      <circle class="ant-tip-r" cx="23" cy="43" r="5.5" fill="#06b6d4" filter="url(#glow-sm)">
        <animate attributeName="cx" values="23;31;23" dur="1s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="43;47;43" dur="1s" repeatCount="indefinite"/>
      </circle>

      <!-- ── BODY SHELL ── -->
      <ellipse cx="0" cy="108" rx="58" ry="42"
        fill="#0f1115" stroke="#06b6d4" stroke-width="2.5" filter="url(#glow-cyan)"/>
      <path d="M-55,108 Q-38,100 -18,105 Q0,110 18,105 Q38,100 55,108"
        fill="none" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4"/>
      <path d="M-50,120 Q-33,113 -15,117 Q0,120 15,117 Q33,113 50,120"
        fill="none" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>
      <ellipse cx="-7" cy="84" rx="18" ry="9" fill="#06b6d4" fill-opacity="0.06"/>

      <!-- ── GIANT EYE ── -->
      <g class="eye-group">
        <circle cx="0" cy="95" r="30" fill="#06b6d4" fill-opacity="0.07" filter="url(#glow-eye)"/>
        <circle cx="0" cy="95" r="24" fill="#09090b" stroke="#06b6d4" stroke-width="2.5"/>
        <circle cx="0" cy="95" r="19" fill="#22d3ee"/>
        <circle cx="0" cy="95" r="13" fill="#0891b2"/>
        <circle cx="0" cy="95" r="8"  fill="#09090b"/>
        <circle cx="6"  cy="88" r="4"   fill="#ffffff" fill-opacity="0.55"/>
        <circle cx="-9" cy="101" r="2.5" fill="#ffffff" fill-opacity="0.20"/>
      </g>

      <!-- ── ARM HEX TEXTS ── -->
      <text class="arm-l" x="-110" y="115"
        font-family="'Courier New',Courier,monospace"
        font-size="13" font-weight="bold"
        fill="#f59e0b" filter="url(#glow-sm)">{0x4F}</text>
      <text class="arm-r" x="64" y="115"
        font-family="'Courier New',Courier,monospace"
        font-size="13" font-weight="bold"
        fill="#f59e0b" filter="url(#glow-sm)">{0x13}</text>

      <!-- ── UNDERBELLY ── -->
      <path d="M-55,132 Q-38,142 -20,134 Q-5,126 5,134 Q22,142 40,134 Q52,126 55,132"
        fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.45"/>
    </g>
  </g>

  <!-- ─── Border dividers ─── -->
  <rect x="0" y="0"   width="1200" height="2" fill="url(#divider)"/>
  <rect x="0" y="198" width="1200" height="2" fill="url(#divider)"/>
</svg>
