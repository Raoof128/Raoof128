<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 8" width="100%" preserveAspectRatio="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#030014" stop-opacity="1"/>
      <stop offset="12%"  stop-color="#4c1d95" stop-opacity="0.7"/>
      <stop offset="30%"  stop-color="#7c3aed" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#ec4899" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#7c3aed" stop-opacity="1"/>
      <stop offset="88%"  stop-color="#fbbf24" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#030014" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-5%" y="-100%" width="110%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="8" fill="#030014"/>
  <rect y="3" width="1200" height="2" fill="url(#g)" filter="url(#glow)"/>
  <rect y="3" width="140" height="2" fill="url(#shimmer)">
    <animate attributeName="x" from="-140" to="1200" dur="2.8s" repeatCount="indefinite" calcMode="linear"/>
  </rect>
</svg>
