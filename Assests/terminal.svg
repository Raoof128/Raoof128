<svg viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#00cc33;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#00ff41;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#00ff0a;stop-opacity:0.03"/>
      <stop offset="100%" style="stop-color:#00ff0a;stop-opacity:0"/>
    </linearGradient>
    <style>
      .bg { fill: #0a0e14; }
      .bar { fill: #13191f; }
      .border { fill: none; stroke: url(#borderGrad); stroke-width: 1.5; }
      .tl-r { fill: #ff5f57; } .tl-y { fill: #febc2e; } .tl-g { fill: #28c840; }
      .bar-txt { font: 11px 'Courier New', Courier, monospace; fill: #4a5568; }
      .prompt { font: 600 14px 'Courier New', Courier, monospace; fill: #6a9955; filter: url(#glow); }
      .cmd { font: 600 14px 'Courier New', Courier, monospace; fill: #d4d4d4; }
      .out-key { font: 14px 'Courier New', Courier, monospace; fill: #4ec9b0; filter: url(#glow); }
      .out-val { font: 14px 'Courier New', Courier, monospace; fill: #00ff41; filter: url(#glow); }
      .out-dim { font: 14px 'Courier New', Courier, monospace; fill: #4a5568; }
      .matrix { font: bold 13px 'Courier New', Courier, monospace; fill: #003d10; }
      .cursor-blink { fill: #00ff41; animation: blink 1.1s step-end infinite; filter: url(#glow); }
      .line-1 { animation: appear 0.01s ease 0.1s both; opacity: 0; }
      .line-2 { animation: appear 0.01s ease 0.9s both; opacity: 0; }
      .line-3 { animation: appear 0.01s ease 1.0s both; opacity: 0; }
      .line-4 { animation: appear 0.01s ease 1.6s both; opacity: 0; }
      .line-5 { animation: appear 0.01s ease 1.7s both; opacity: 0; }
      .line-6 { animation: appear 0.01s ease 1.8s both; opacity: 0; }
      .line-7 { animation: appear 0.01s ease 1.9s both; opacity: 0; }
      .line-8 { animation: appear 0.01s ease 2.0s both; opacity: 0; }
      .line-9 { animation: appear 0.01s ease 2.1s both; opacity: 0; }
      .line-10 { animation: appear 0.01s ease 2.8s both; opacity: 0; }
      .line-11 { animation: appear 0.01s ease 2.9s both; opacity: 0; }
      .line-12 { animation: appear 0.01s ease 3.6s both; opacity: 0; }
      .m0 { animation: pulse 2.3s ease-in-out 0.0s infinite; }
      .m1 { animation: pulse 2.3s ease-in-out 0.3s infinite; }
      .m2 { animation: pulse 2.3s ease-in-out 0.6s infinite; }
      .m3 { animation: pulse 2.3s ease-in-out 0.9s infinite; }
      .m4 { animation: pulse 2.3s ease-in-out 1.2s infinite; }
      .m5 { animation: pulse 2.3s ease-in-out 1.5s infinite; }
      @keyframes blink { 0%,100%{opacity:1} 49%{opacity:1} 50%,99%{opacity:0} }
      @keyframes appear { from{opacity:0} to{opacity:1} }
      @keyframes pulse { 0%,100%{opacity:0.12} 50%{opacity:0.45} }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="320" rx="10" class="bg"/>

  <!-- Matrix rain (subtle background) -->
  <text class="matrix m0" x="18"  y="80">1</text>
  <text class="matrix m1" x="18"  y="96">0</text>
  <text class="matrix m2" x="18"  y="112">1</text>
  <text class="matrix m3" x="18"  y="128">1</text>
  <text class="matrix m4" x="18"  y="144">0</text>
  <text class="matrix m5" x="18"  y="160">0</text>
  <text class="matrix m1" x="18"  y="176">1</text>
  <text class="matrix m2" x="18"  y="192">1</text>
  <text class="matrix m0" x="18"  y="208">0</text>
  <text class="matrix m3" x="18"  y="224">1</text>
  <text class="matrix m4" x="18"  y="240">0</text>
  <text class="matrix m5" x="18"  y="256">1</text>
  <text class="matrix m0" x="18"  y="272">0</text>
  <text class="matrix m1" x="18"  y="288">1</text>
  <text class="matrix m2" x="18"  y="304">0</text>

  <text class="matrix m3" x="828" y="80">0</text>
  <text class="matrix m4" x="828" y="96">1</text>
  <text class="matrix m5" x="828" y="112">0</text>
  <text class="matrix m0" x="828" y="128">1</text>
  <text class="matrix m1" x="828" y="144">1</text>
  <text class="matrix m2" x="828" y="160">0</text>
  <text class="matrix m3" x="828" y="176">0</text>
  <text class="matrix m4" x="828" y="192">1</text>
  <text class="matrix m5" x="828" y="208">1</text>
  <text class="matrix m0" x="828" y="224">0</text>
  <text class="matrix m1" x="828" y="240">1</text>
  <text class="matrix m2" x="828" y="256">0</text>
  <text class="matrix m3" x="828" y="272">1</text>
  <text class="matrix m4" x="828" y="288">1</text>
  <text class="matrix m5" x="828" y="304">0</text>

  <!-- Scanline overlay -->
  <rect width="860" height="320" rx="10" fill="url(#scanGrad)"/>

  <!-- Title bar -->
  <rect width="860" height="38" rx="10" class="bar"/>
  <rect y="28" width="860" height="10" class="bar"/>

  <!-- Traffic lights -->
  <circle cx="24" cy="19" r="6" class="tl-r"/>
  <circle cx="46" cy="19" r="6" class="tl-y"/>
  <circle cx="68" cy="19" r="6" class="tl-g"/>

  <!-- Title -->
  <text x="430" y="23" text-anchor="middle" class="bar-txt">bash — raouf@security-lab: ~</text>

  <!-- Border glow -->
  <rect x="0.75" y="0.75" width="858.5" height="318.5" rx="9.5" class="border"/>

  <!-- === TERMINAL CONTENT === -->

  <!-- Line 1: prompt + whoami -->
  <g class="line-1">
    <text x="40" y="72" class="prompt">┌──(</text>
    <text x="93" y="72" class="out-val">raouf</text>
    <text x="142" y="72" class="prompt">㉿</text>
    <text x="161" y="72" class="out-key">kali</text>
    <text x="193" y="72" class="prompt">)-[</text>
    <text x="220" y="72" class="out-dim">~</text>
    <text x="232" y="72" class="prompt">]</text>
  </g>
  <g class="line-2">
    <text x="40" y="92" class="prompt">└─$</text>
    <text x="72" y="92" class="cmd"> whoami</text>
  </g>

  <!-- Output block 1 -->
  <g class="line-3"><text x="56" y="114" class="out-key">NAME   </text><text x="158" y="114" class="out-val">Mohammad Raouf Abedini</text></g>
  <g class="line-4"><text x="56" y="130" class="out-key">ROLE   </text><text x="158" y="130" class="out-val">Cybersecurity &amp; AI Security Engineer</text></g>
  <g class="line-5"><text x="56" y="146" class="out-key">BASE   </text><text x="158" y="146" class="out-val">Australia</text></g>
  <g class="line-6"><text x="56" y="162" class="out-key">FOCUS  </text><text x="158" y="162" class="out-val">Red Team · Blue Team · AI Security · Cloud</text></g>

  <!-- Line 2: prompt + cat -->
  <g class="line-7">
    <text x="40" y="188" class="prompt">┌──(</text>
    <text x="93" y="188" class="out-val">raouf</text>
    <text x="142" y="188" class="prompt">㉿</text>
    <text x="161" y="188" class="out-key">kali</text>
    <text x="193" y="188" class="prompt">)-[</text>
    <text x="220" y="188" class="out-dim">~</text>
    <text x="232" y="188" class="prompt">]</text>
  </g>
  <g class="line-8">
    <text x="40" y="208" class="prompt">└─$</text>
    <text x="72" y="208" class="cmd"> cat mission.txt</text>
  </g>

  <!-- Output block 2 -->
  <g class="line-9"><text x="56" y="230" class="out-dim">»</text><text x="72" y="230" class="out-val"> Breaking Systems. Building Defences. Automating Everything.</text></g>
  <g class="line-10"><text x="56" y="246" class="out-dim">»</text><text x="72" y="246" class="out-val"> Pushing AI + Security to the absolute limit.</text></g>

  <!-- Final prompt + cursor -->
  <g class="line-11">
    <text x="40" y="272" class="prompt">┌──(</text>
    <text x="93" y="272" class="out-val">raouf</text>
    <text x="142" y="272" class="prompt">㉿</text>
    <text x="161" y="272" class="out-key">kali</text>
    <text x="193" y="272" class="prompt">)-[</text>
    <text x="220" y="272" class="out-dim">~</text>
    <text x="232" y="272" class="prompt">]</text>
  </g>
  <g class="line-12">
    <text x="40" y="292" class="prompt">└─$</text>
    <text x="72" y="292" class="cmd"> </text>
    <rect class="cursor-blink" x="80" y="278" width="9" height="17" rx="1"/>
  </g>
</svg>
