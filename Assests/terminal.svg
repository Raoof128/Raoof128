<svg viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Portfolio section-divider gradient: cyan → purple → amber -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#09090b;stop-opacity:1"/>
      <stop offset="20%"  style="stop-color:#06b6d4;stop-opacity:0.9"/>
      <stop offset="50%"  style="stop-color:#8b5cf6;stop-opacity:0.7"/>
      <stop offset="80%"  style="stop-color:#f59e0b;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#09090b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="borderGradV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#06b6d4;stop-opacity:0.6"/>
      <stop offset="50%"  style="stop-color:#8b5cf6;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.6"/>
    </linearGradient>
    <!-- Cyan glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-amber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      /* Portfolio exact colors */
      .bg      { fill: #09090b; }
      .bar     { fill: #0f1115; }
      .tl-r    { fill: #ff5f57; }
      .tl-y    { fill: #febc2e; }
      .tl-g    { fill: #28c840; }
      .bar-txt { font: 11px 'JetBrains Mono', 'Courier New', monospace; fill: #27272a; }
      /* Prompt brackets: cyan */
      .prompt  { font: 600 14px 'JetBrains Mono', 'Courier New', monospace; fill: #22d3ee; filter: url(#glow); }
      /* Username: amber */
      .u-name  { font: 700 14px 'JetBrains Mono', 'Courier New', monospace; fill: #f59e0b; filter: url(#glow-amber); }
      /* Hostname: purple */
      .h-name  { font: 700 14px 'JetBrains Mono', 'Courier New', monospace; fill: #a78bfa; filter: url(#glow); }
      /* Commands: off-white */
      .cmd     { font: 600 14px 'JetBrains Mono', 'Courier New', monospace; fill: #e4e4e7; }
      /* Output keys: cyan */
      .out-key { font: 14px 'JetBrains Mono', 'Courier New', monospace; fill: #06b6d4; filter: url(#glow); }
      /* Output values: off-white */
      .out-val { font: 14px 'JetBrains Mono', 'Courier New', monospace; fill: #e4e4e7; }
      /* Dim text */
      .out-dim { font: 14px 'JetBrains Mono', 'Courier New', monospace; fill: #27272a; }
      /* Background matrix chars: barely visible */
      .matrix  { font: bold 13px 'JetBrains Mono', 'Courier New', monospace; fill: #0f1115; }
      /* Cursor: cyan blink */
      .cursor-blink { fill: #06b6d4; animation: blink 1.1s step-end infinite; filter: url(#glow); }
      /* Line reveal animations */
      .line-1  { animation: appear 0.01s ease 0.1s both;  opacity: 0; }
      .line-2  { animation: appear 0.01s ease 0.9s both;  opacity: 0; }
      .line-3  { animation: appear 0.01s ease 1.0s both;  opacity: 0; }
      .line-4  { animation: appear 0.01s ease 1.7s both;  opacity: 0; }
      .line-5  { animation: appear 0.01s ease 1.8s both;  opacity: 0; }
      .line-6  { animation: appear 0.01s ease 1.9s both;  opacity: 0; }
      .line-7  { animation: appear 0.01s ease 2.0s both;  opacity: 0; }
      .line-8  { animation: appear 0.01s ease 2.7s both;  opacity: 0; }
      .line-9  { animation: appear 0.01s ease 2.8s both;  opacity: 0; }
      .line-10 { animation: appear 0.01s ease 2.9s both;  opacity: 0; }
      .line-11 { animation: appear 0.01s ease 3.6s both;  opacity: 0; }
      .line-12 { animation: appear 0.01s ease 3.7s both;  opacity: 0; }
      /* Matrix pulse */
      .m0 { animation: mpulse 2.4s ease-in-out 0.0s infinite; }
      .m1 { animation: mpulse 2.4s ease-in-out 0.4s infinite; }
      .m2 { animation: mpulse 2.4s ease-in-out 0.8s infinite; }
      .m3 { animation: mpulse 2.4s ease-in-out 1.2s infinite; }
      .m4 { animation: mpulse 2.4s ease-in-out 1.6s infinite; }
      .m5 { animation: mpulse 2.4s ease-in-out 2.0s infinite; }
      @keyframes blink   { 0%,100%{opacity:1} 49%{opacity:1} 50%,99%{opacity:0} }
      @keyframes appear  { from{opacity:0} to{opacity:1} }
      @keyframes mpulse  { 0%,100%{opacity:0.08} 50%{opacity:0.35} }
    </style>
  </defs>

  <!-- Background: portfolio cyber-black -->
  <rect width="860" height="320" rx="0" class="bg"/>

  <!-- Matrix rain columns (barely visible, portfolio cyber-dark) -->
  <text class="matrix m0" x="18"  y="80">1</text><text class="matrix m1" x="18"  y="96">0</text>
  <text class="matrix m2" x="18"  y="112">1</text><text class="matrix m3" x="18"  y="128">1</text>
  <text class="matrix m4" x="18"  y="144">0</text><text class="matrix m5" x="18"  y="160">1</text>
  <text class="matrix m0" x="18"  y="176">0</text><text class="matrix m1" x="18"  y="192">1</text>
  <text class="matrix m2" x="18"  y="208">1</text><text class="matrix m3" x="18"  y="224">0</text>
  <text class="matrix m4" x="18"  y="240">1</text><text class="matrix m5" x="18"  y="256">0</text>
  <text class="matrix m0" x="18"  y="272">1</text><text class="matrix m1" x="18"  y="288">0</text>
  <text class="matrix m2" x="18"  y="304">1</text>

  <text class="matrix m3" x="833" y="80">0</text><text class="matrix m4" x="833" y="96">1</text>
  <text class="matrix m5" x="833" y="112">0</text><text class="matrix m0" x="833" y="128">1</text>
  <text class="matrix m1" x="833" y="144">1</text><text class="matrix m2" x="833" y="160">0</text>
  <text class="matrix m3" x="833" y="176">0</text><text class="matrix m4" x="833" y="192">1</text>
  <text class="matrix m5" x="833" y="208">0</text><text class="matrix m0" x="833" y="224">1</text>
  <text class="matrix m1" x="833" y="240">1</text><text class="matrix m2" x="833" y="256">0</text>
  <text class="matrix m3" x="833" y="272">1</text><text class="matrix m4" x="833" y="288">0</text>
  <text class="matrix m5" x="833" y="304">1</text>

  <!-- Title bar: cyber-dark -->
  <rect width="860" height="38" rx="0" class="bar"/>
  <rect y="28" width="860" height="10" class="bar"/>

  <!-- Traffic lights -->
  <circle cx="24" cy="19" r="6" class="tl-r"/>
  <circle cx="46" cy="19" r="6" class="tl-y"/>
  <circle cx="68" cy="19" r="6" class="tl-g"/>

  <!-- Bar text -->
  <text x="430" y="23" text-anchor="middle" class="bar-txt">bash — raouf@security-lab: ~</text>

  <!-- Portfolio section-divider border: top and bottom -->
  <rect x="0" y="0"   width="860" height="2" fill="url(#borderGrad)"/>
  <rect x="0" y="318" width="860" height="2" fill="url(#borderGrad)"/>
  <!-- Left and right borders: vertical gradient -->
  <rect x="0"   y="0" width="2" height="320" fill="url(#borderGradV)"/>
  <rect x="858" y="0" width="2" height="320" fill="url(#borderGradV)"/>

  <!-- ═══ TERMINAL CONTENT ═══ -->

  <!-- Prompt 1 -->
  <g class="line-1">
    <text x="40"  y="72" class="prompt">┌──(</text>
    <text x="93"  y="72" class="u-name">raouf</text>
    <text x="142" y="72" class="prompt">㉿</text>
    <text x="162" y="72" class="h-name">security-lab</text>
    <text x="282" y="72" class="prompt">)-[</text>
    <text x="310" y="72" class="out-dim">~</text>
    <text x="322" y="72" class="prompt">]</text>
  </g>
  <g class="line-2">
    <text x="40" y="92" class="prompt">└─$</text>
    <text x="72" y="92" class="cmd"> whoami</text>
  </g>

  <!-- Output 1 -->
  <g class="line-3"><text x="56" y="114" class="out-key">NAME   </text><text x="158" y="114" class="out-val">Mohammad Raouf Abedini</text></g>
  <g class="line-4"><text x="56" y="130" class="out-key">ROLE   </text><text x="158" y="130" class="out-val">Cybersecurity &amp; AI Security Engineer</text></g>
  <g class="line-5"><text x="56" y="146" class="out-key">BASE   </text><text x="158" y="146" class="out-val">Australia  🇦🇺</text></g>
  <g class="line-6"><text x="56" y="162" class="out-key">FOCUS  </text><text x="158" y="162" class="out-val">Red Team · Blue Team · AI Security · Cloud</text></g>

  <!-- Prompt 2 -->
  <g class="line-7">
    <text x="40"  y="188" class="prompt">┌──(</text>
    <text x="93"  y="188" class="u-name">raouf</text>
    <text x="142" y="188" class="prompt">㉿</text>
    <text x="162" y="188" class="h-name">security-lab</text>
    <text x="282" y="188" class="prompt">)-[</text>
    <text x="310" y="188" class="out-dim">~</text>
    <text x="322" y="188" class="prompt">]</text>
  </g>
  <g class="line-8">
    <text x="40" y="208" class="prompt">└─$</text>
    <text x="72" y="208" class="cmd"> cat mission.txt</text>
  </g>

  <!-- Output 2 -->
  <g class="line-9"> <text x="56" y="230" class="out-key">»</text><text x="72" y="230" class="out-val"> Breaking Systems. Building Defences. Automating Everything.</text></g>
  <g class="line-10"><text x="56" y="246" class="out-key">»</text><text x="72" y="246" class="out-val"> Pushing AI + Security to the absolute limit.</text></g>

  <!-- Final prompt + cursor -->
  <g class="line-11">
    <text x="40"  y="272" class="prompt">┌──(</text>
    <text x="93"  y="272" class="u-name">raouf</text>
    <text x="142" y="272" class="prompt">㉿</text>
    <text x="162" y="272" class="h-name">security-lab</text>
    <text x="282" y="272" class="prompt">)-[</text>
    <text x="310" y="272" class="out-dim">~</text>
    <text x="322" y="272" class="prompt">]</text>
  </g>
  <g class="line-12">
    <text x="40" y="292" class="prompt">└─$</text>
    <rect class="cursor-blink" x="80" y="278" width="9" height="17" rx="0"/>
  </g>
</svg>
